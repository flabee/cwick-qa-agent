# Rooms — YAML test cases
# App: Cwick Rooms — conversational AI data room for M&A / finance due diligence
# Branding: "Lio Energy Knowledge Base" (demo data room)
# Base path: /rooms/*
# Login: demo4@test.it
# Nav: Chat, Archivio, Documenti, Guida, Statistiche, Admin, Pagamenti
#
# Core feature: ask natural-language questions about data room documents
# Quick searches: Key Financials, Location, Revenue, EBITDA, Team, Market, Risks, Documents, Summary

tests:

  - name: "chat page loads with question input and quick searches"
    start_url: "https://knowledgebase-frontend-p55f.onrender.com/rooms/chat"
    steps:
      - wait: 3
      - expect_not_text: "Invalid Date"
      - expect_not_text: "[object Object]"
      - expect_not_text: "undefined"
      # Main chat/search input must be present
      - expect_visible: "input[type='text'], input[type='search'], textarea"
      # Quick search chips must be visible
      - expect_visible: ":has-text('Quick searches')"
      - screenshot: "chat_home"

  - name: "quick search chip triggers a query"
    start_url: "https://knowledgebase-frontend-p55f.onrender.com/rooms/chat"
    steps:
      - wait: 3
      - click: "button:has-text('Key Financials'), span:has-text('Key Financials'), :has-text('Key Financials') >> nth=0"
      - wait: 4
      - expect_not_text: "Invalid Date"
      - expect_not_text: "undefined"
      - screenshot: "quick_search_key_financials"

  - name: "type and send a question in chat — streaming starts"
    start_url: "https://knowledgebase-frontend-p55f.onrender.com/rooms/chat"
    steps:
      - wait: 3
      - fill: ["input[type='text'], input[type='search'], textarea", "What are the key financials?"]
      - press: "Enter"
      - wait: 5
      - expect_not_text: "Invalid Date"
      - expect_not_text: "undefined"
      # Streaming indicator or response bubble must appear within 5s of sending
      - expect_visible: ":has-text('Ricerca documenti'), :has-text('Generazione in corso'), :has-text('Ragiono')"
      - screenshot: "chat_after_question"

  - name: "archive section loads"
    start_url: "https://knowledgebase-frontend-p55f.onrender.com/rooms/archive"
    steps:
      - wait: 3
      - expect_not_text: "Invalid Date"
      - expect_not_text: "undefined"
      - screenshot: "archive"

  - name: "documents section loads with file list"
    start_url: "https://knowledgebase-frontend-p55f.onrender.com/rooms/documents"
    steps:
      - wait: 3
      - expect_not_text: "Invalid Date"
      - expect_not_text: "undefined"
      - expect_visible: ":has-text('Carica')"
      - screenshot: "documents"

  - name: "upload tab — file upload completes without error"
    start_url: "https://knowledgebase-frontend-p55f.onrender.com/rooms/documents"
    steps:
      - wait: 3
      - click: ":is(button,[role='tab'],a):has-text('Carica')"
      - wait: 3
      - screenshot: "documents_upload_tab"
      - expect_visible: ":has-text('Trascina'), :has-text('Scegli File')"
      # Attach a test file — error toast appears immediately if upload fails
      - set_input_files: ["input[type='file']", "~/cwick-qa-agent/session_output/test_upload.txt"]
      - wait: 2
      - screenshot: "documents_file_selected"
      # Check immediately — toast is short-lived
      - expect_not_text: "Caricamento fallito"
      - expect_not_text: "fallito"
      - expect_not_text: "Error"

  - name: "guide page loads with feature cards"
    start_url: "https://knowledgebase-frontend-p55f.onrender.com/rooms/guide"
    steps:
      - wait: 3
      - expect_not_text: "Invalid Date"
      - expect_not_text: "undefined"
      # Guide must show the capability cards
      - expect_visible: ":has-text('Cosa Puoi Fare'), :has-text('Come Usare')"
      - screenshot: "guide"

  - name: "statistics page loads"
    start_url: "https://knowledgebase-frontend-p55f.onrender.com/rooms/stats"
    steps:
      - wait: 3
      - expect_not_text: "Invalid Date"
      - expect_not_text: "undefined"
      - screenshot: "stats"
