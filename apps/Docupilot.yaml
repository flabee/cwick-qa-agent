# Docupilot — YAML test cases
# Base path: /docupilot/*
# Login: demo1@test.it
# Cards on /new are <a> elements: href="/docupilot/new/from-existing" and "/docupilot/new/from-template"

tests:

  - name: "dashboard loads with content"
    start_url: "https://knowledgebase-frontend-p55f.onrender.com/docupilot/dashboard"
    steps:
      - wait: 3
      - expect_not_text: "Invalid Date"
      - expect_not_text: "[object Object]"
      - expect_not_text: "undefined"
      - screenshot: "dashboard"

  - name: "documents list loads"
    start_url: "https://knowledgebase-frontend-p55f.onrender.com/docupilot/documents"
    steps:
      - wait: 3
      - expect_not_text: "Invalid Date"
      - expect_not_text: "undefined"
      - screenshot: "documents_list"

  - name: "knowledge base loads"
    start_url: "https://knowledgebase-frontend-p55f.onrender.com/docupilot/kb"
    steps:
      - wait: 3
      - expect_not_text: "Invalid Date"
      - expect_not_text: "undefined"
      - screenshot: "kb_list"

  - name: "new document page shows both options"
    start_url: "https://knowledgebase-frontend-p55f.onrender.com/docupilot/new"
    steps:
      - wait: 3
      - expect_visible: "a[href='/docupilot/new/from-existing']"
      - expect_visible: "a[href='/docupilot/new/from-template']"
      - expect_not_text: "undefined"
      - screenshot: "new_document_options"

  - name: "new document from blank template"
    start_url: "https://knowledgebase-frontend-p55f.onrender.com/docupilot/new"
    steps:
      - wait: 2
      - click: "a[href='/docupilot/new/from-template']"
      - wait: 3
      - expect_not_text: "undefined"
      - screenshot: "blank_template_flow"

  - name: "create document from knowledge base"
    start_url: "https://knowledgebase-frontend-p55f.onrender.com/docupilot/new/from-existing"
    steps:
      - wait: 3
      - expect_not_text: "undefined"
      - expect_not_text: "Invalid Date"
      - screenshot: "from_existing_page"
      # Must show KB document cards to select from
      - expect_count: [":is(li,tr,[class*='item'],[class*='row'],[class*='card']):visible", 1]
      - screenshot: "kb_items_visible"
      # Click first document card
      - click: "[class*='rounded']:has-text('SDS_'), [class*='rounded']:has-text('Specifica_'), [class*='rounded']:has-text('Manuale_'), [class*='rounded']:has-text('Offerta_')"
      - wait: 2
      - screenshot: "after_kb_doc_selected"
      # Continue button should appear once a document is selected
      - expect_visible: "button:has-text('Continue')"
      - click: "button:has-text('Continue')"
      - wait: 3
      - screenshot: "generation_chat_loaded"
      - expect_not_text: "undefined"
      - expect_not_text: "Invalid Date"
      # Chat interface must have a text input for requirements
      - expect_visible: "textarea, input[placeholder*='document' i], input[placeholder*='Describe' i]"
      # Fill in document requirements and press Enter to send
      - fill: ["textarea, input[placeholder*='document' i]", "Adatta per cliente nuovo, stesse specifiche tecniche"]
      - press: "Enter"
      - wait: 5
      - screenshot: "after_requirements_sent"
      - expect_not_text: "undefined"
