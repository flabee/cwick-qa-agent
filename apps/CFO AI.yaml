# CFO AI — YAML test cases
# Base path: /cfo/*
# Login: demo2@test.it

tests:

  - name: "dashboard / chat loads with content"
    start_url: "https://knowledgebase-frontend-p55f.onrender.com/cfo/dashboard"
    steps:
      - wait: 3
      - expect_not_text: "Invalid Date"
      - expect_not_text: "[object Object]"
      - expect_not_text: "undefined"
      - screenshot: "dashboard"

  - name: "documents list loads"
    start_url: "https://knowledgebase-frontend-p55f.onrender.com/cfo/documents"
    steps:
      - wait: 3
      - expect_not_text: "Invalid Date"
      - expect_not_text: "undefined"
      - screenshot: "documents"

  - name: "strategic analysis loads"
    start_url: "https://knowledgebase-frontend-p55f.onrender.com/cfo/strategic-analysis"
    steps:
      - wait: 3
      - expect_not_text: "Invalid Date"
      - expect_not_text: "undefined"
      - screenshot: "strategic_analysis"

  - name: "news section loads"
    start_url: "https://knowledgebase-frontend-p55f.onrender.com/cfo/news"
    steps:
      - wait: 3
      - expect_not_text: "Invalid Date"
      - expect_not_text: "undefined"
      - screenshot: "news"

  - name: "admin panel accessible"
    start_url: "https://knowledgebase-frontend-p55f.onrender.com/cfo/admin"
    steps:
      - wait: 3
      - expect_not_text: "undefined"
      - screenshot: "admin"
