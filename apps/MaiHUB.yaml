# MaiHUB — YAML test cases
# Italian/mixed UI. Base path: /maihub/*
# Login: demo3@test.it

tests:

  - name: "courses list loads with content"
    start_url: "https://knowledgebase-frontend-p55f.onrender.com/maihub/courses"
    steps:
      - wait: 3
      - expect_not_text: "Invalid Date"
      - expect_not_text: "[object Object]"
      - expect_not_text: "undefined"
      - expect_count: [":is([class*='course'],[class*='card'],[class*='item'])", 1]
      - screenshot: "courses_list"

  - name: "open first course detail"
    start_url: "https://knowledgebase-frontend-p55f.onrender.com/maihub/courses"
    steps:
      - wait: 3
      - click: ":is([class*='course'],[class*='card'],[class*='item']):visible"
      - wait: 2
      - expect_not_text: "Invalid Date"
      - expect_not_text: "undefined"
      - screenshot: "course_detail"

  - name: "leaderboard loads with content"
    start_url: "https://knowledgebase-frontend-p55f.onrender.com/maihub/leaderboard"
    steps:
      - wait: 3
      - expect_not_text: "Invalid Date"
      - expect_not_text: "undefined"
      - expect_not_text: "[object Object]"
      - screenshot: "leaderboard"

  - name: "news section loads with content"
    start_url: "https://knowledgebase-frontend-p55f.onrender.com/maihub/news"
    steps:
      - wait: 3
      - expect_not_text: "Invalid Date"
      - expect_not_text: "undefined"
      - screenshot: "news_list"

  - name: "profile page - no Invalid Date"
    start_url: "https://knowledgebase-frontend-p55f.onrender.com/maihub/profile"
    steps:
      - wait: 3
      - expect_not_text: "Invalid Date"
      - expect_not_text: "undefined"
      - expect_not_text: "NaN"
      - screenshot: "profile_page"

  - name: "admin users panel accessible"
    start_url: "https://knowledgebase-frontend-p55f.onrender.com/maihub/admin/users"
    steps:
      - wait: 3
      - expect_url: "/admin/"
      - expect_not_text: "undefined"
      - screenshot: "admin_users"

  - name: "admin courses panel accessible"
    start_url: "https://knowledgebase-frontend-p55f.onrender.com/maihub/admin/courses"
    steps:
      - wait: 3
      - expect_url: "/admin/"
      - expect_not_text: "undefined"
      - screenshot: "admin_courses"

  - name: "admin news panel accessible"
    start_url: "https://knowledgebase-frontend-p55f.onrender.com/maihub/admin/news"
    steps:
      - wait: 3
      - expect_url: "/admin/"
      - expect_not_text: "undefined"
      - screenshot: "admin_news"
